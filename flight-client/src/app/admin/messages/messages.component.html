<h2 class="title">{{ 'adminMessages.title' | t }}</h2>

<div *ngIf="loading" class="loading">{{ 'adminMessages.loading' | t }}</div>

<div *ngIf="!loading && messages.length === 0" class="no-data">
  {{ 'adminMessages.noData' | t }}
</div>

<div class="messages-grid">

  <div *ngFor="let m of messages" class="message-card">

    <div class="card-header">
      <h3>{{ m.fullName }}</h3>
      <span class="date">{{ m.createdAt | date:'dd.MM.yyyy HH:mm' }}</span>
    </div>

    <p class="email"><i class="bi bi-envelope"></i> {{ m.email }}</p>

    <p class="subject">
      <strong>{{ 'adminMessages.subject' | t }}</strong> {{ m.subject }}
    </p>

    <p class="text">
      {{ m.message }}
    </p>

  </div>

</div>
