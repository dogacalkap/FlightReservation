<nav class="navbar">
  <a class="logo" routerLink="/landing">
    <span class="logo-mark" aria-hidden="true">
      <i class="bi bi-airplane"></i>
    </span>
    <span class="logo-text">SuperAirlines</span>
  </a>

  <ul class="menu">
    <li *ngFor="let link of links">
      <a [routerLink]="link.path" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        {{ link.label | t }}
      </a>
    </li>
  </ul>

  <div class="actions">
    <ng-container *ngIf="currentUser; else guestActions">
      <div class="user-pill">
        <i class="bi bi-person-circle"></i>
        <span>{{ currentUser.fullName || 'Yolcu' }}</span>
      </div>
      <button class="btn ghost" (click)="logout()">{{ 'nav.logout' | t }}</button>
    </ng-container>
    <ng-template #guestActions>
      <a class="btn ghost" routerLink="/login">{{ 'nav.login' | t }}</a>
      <a class="btn primary" routerLink="/customer">{{ 'nav.buy' | t }}</a>
    </ng-template>
    <div class="lang-switch">
      <button (click)="setLang('tr')" aria-label="Türkçe">TR</button>
      <button (click)="setLang('en')" aria-label="English">EN</button>
    </div>
  </div>
</nav>
