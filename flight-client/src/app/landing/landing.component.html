<div class="landing-container">

  <!-- NAVBAR -->
  <app-navbar></app-navbar>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- LEFT: TEXT -->
    <div class="hero-text">
      <h1>Uçuşunu Bir Tıkla Planla!</h1>
      <p>En uygun fiyatlarla uçuş ara, karşılaştır ve kolayca bilet al.</p>
    </div>

    <!-- RIGHT: LOTTIE ANIMATION -->
    <div class="hero-animation">
      <ng-lottie 
        [options]="flightAnimation"
        width="350px"
        height="350px"
        class="lottie-plane">
      </ng-lottie>
    </div>

  </section>

  <!-- FLIGHT SEARCH ON LANDING -->
  <section class="landing-search">
    <h3>Hemen Uçuşunu Bul</h3>
    <p class="subtitle">Şehir ve tarih seç, anında uygun uçuşları gör. Seçtiğinde süreç otomatik devam etsin.</p>
    <app-seat-availability [redirectToCustomer]="true"></app-seat-availability>
  </section>

  <!-- CONTACT SECTION -->
  <app-contact-block></app-contact-block>

  <!-- WAVE BACKGROUND -->
  <div class="background-shape"></div>

</div>
