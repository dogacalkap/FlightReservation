<div class="landing-container">

  <!-- NAVBAR -->
  <app-navbar></app-navbar>

  <!-- HERO SECTION -->
  <section class="hero">

    <!-- LEFT: TEXT -->
    <div class="hero-text">
      <h1>{{ 'landing.hero.title' | t }}</h1>
      <p>{{ 'landing.hero.subtitle' | t }}</p>
    </div>

    <!-- RIGHT: LOTTIE ANIMATION -->
    <div class="hero-animation">
      <ng-lottie 
        [options]="flightAnimation"
        width="350px"
        height="350px"
        class="lottie-plane">
      </ng-lottie>
    </div>

  </section>

  <!-- FLIGHT SEARCH ON LANDING -->
  <section class="landing-search">
    <h3>{{ 'landing.search.title' | t }}</h3>
    <p class="subtitle">{{ 'landing.search.subtitle' | t }}</p>
    <app-seat-availability [redirectToCustomer]="true"></app-seat-availability>
  </section>

  <!-- CONTACT SECTION -->
  <app-contact-block></app-contact-block>

  <!-- WAVE BACKGROUND -->
  <div class="background-shape"></div>

</div>
