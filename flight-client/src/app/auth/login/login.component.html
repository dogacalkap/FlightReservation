<div class="modal-overlay">
  <div class="modal-card">

    <h2 class="modal-title">Login</h2>

    <!-- ERROR -->
    <div *ngIf="error" class="error-box">
      <i class="bi bi-exclamation-circle"></i>
      {{ error }}
    </div>

    <!-- FORM -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
      <label>Username</label>
      <input formControlName="username" type="text" placeholder="Kullanıcı adı giriniz" />
    </div>

    <div
    *ngIf="loginForm.get('username')?.touched && loginForm.get('username')?.errors?.['required']"
    class="error-box"
    >
   <i class="bi bi-exclamation-circle"></i>
    Kullanıcı adı zorunludur.
    </div>


      <div class="input-group">
        <label>Password</label>
        <input formControlName="password" type="password" placeholder="Enter password" />
      </div>
      <!-- Şifre minimum 6 karakter uyarısı -->
      <div
      *ngIf="
      loginForm.get('password')?.touched &&
      loginForm.get('password')?.errors?.['minlength']
        "
      class="error-box"
      >
      <i class="bi bi-exclamation-circle"></i>
      Şifre en az 6 karakter olmalıdır.
      </div>




      <button class="primary-btn" type="submit" [disabled]="loading">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>
    </form>

    <button class="close-btn" (click)="onCloseClick()">
      <i class="bi bi-x-lg"></i>
    </button>

  </div>
</div>
